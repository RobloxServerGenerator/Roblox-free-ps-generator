<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOX PRIVATE SERVER HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { 
            background: linear-gradient(135deg, #0a0000, #1a001f, #000000);
            color: white; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .bubble { 
            position: fixed; 
            border-radius: 50%; 
            background: radial-gradient(circle, rgba(168, 85, 247, 0.25), rgba(239, 68, 68, 0.15));
            z-index: -1; 
            animation: float 18s linear infinite;
            box-shadow: 0 0 35px rgba(168, 85, 247, 0.4);
        }
        @keyframes float { 
            from { transform: translateY(100vh) scale(0.8); } 
            to { transform: translateY(-350px) scale(1.3); } 
        }

        .neon-text {
            text-shadow: 0 0 10px #a855f7,
                        0 0 20px #a855f7,
                        0 0 40px #ef4444;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

<script>
    for(let i = 0; i < 35; i++) {  
        let b = document.createElement("div");  
        b.className = "bubble";  
        let size = Math.random() * 110 + 40;  
        b.style.width = size + "px";  
        b.style.height = size + "px";  
        b.style.left = Math.random() * 100 + "vw";  
        b.style.animationDuration = (Math.random() * 22 + 16) + "s";  
        document.body.appendChild(b);  
    }  
</script>

<div class="max-w-7xl mx-auto px-6 pt-12">
    <div class="text-center mb-16">
        <h1 class="text-6xl md:text-7xl font-bold title-font neon-text tracking-tighter mb-2">
            ROBLOX
        </h1>
        <p class="text-3xl text-purple-400 font-medium">ONLINE FREE</p>
    </div>

    <div class="bg-black/70 backdrop-blur-3xl border border-purple-500/50 rounded-3xl p-8 shadow-2xl mb-16">
        <input id="search" type="text"   
               class="w-full bg-zinc-950 border-2 border-purple-500 focus:border-pink-500 rounded-2xl px-8 py-7 text-xl outline-none text-white placeholder-zinc-500"
               placeholder="Search a game...">
        <div id="results" class="mt-8 space-y-4"></div>
    </div>

    <h2 class="text-4xl font-bold text-purple-400 mb-10 flex items-center gap-3">
        <i class="fa-solid fa-bolt"></i>
        TRENDING GAMES
    </h2>
    
    <div id="all-games" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
</div>

    const resultsDiv = document.getElementById("results");
    const allGamesDiv = document.getElementById("all-games");

    document.getElementById("search").addEventListener("input", e => {  
        const q = e.target.value.toLowerCase().trim();  
        resultsDiv.innerHTML = "";  
        if (q.length < 2) return;  

        games.filter(g => g.name.toLowerCase().includes(q)).forEach(game => {  
            const slug = game.name.replace(/\s+/g, "-").toLowerCase();
            const link = `https://roblox.com.bz/games/\( {game.id}/ \){slug}?privateServerLinkCode=56676300489403480005785397786173`;  

            const div = document.createElement("div");  
            div.className = "flex justify-between items-center bg-zinc-900 border border-purple-500/30 rounded-2xl p-5";
            div.innerHTML = `  
                <span class="text-xl">${game.name}</span>  
                <button onclick="copyLink('${link}', this)" class="bg-purple-600 hover:bg-pink-600 px-8 py-4 rounded-xl font-semibold">COPY</button>  
            `;  
            resultsDiv.appendChild(div);  
        });  
    });

    games.forEach(game => {  
        const slug = game.name.replace(/\s+/g, "-").toLowerCase();
        const link = `https://roblox.com.bz/games/\( {game.id}/ \){slug}?privateServerLinkCode=56676300489403480005785397786173`;  

        const card = document.createElement("div");  
        card.className = "game-card rounded-3xl overflow-hidden";  
        card.innerHTML = `  
            <img src="https://www.roblox.com/Thumbs/Asset.ashx?width=420&height=230&assetId=${game.id}" class="game-img w-full h-48 object-cover">
            <div class="p-5">
                <div class="font-medium text-lg mb-4">${game.name}</div>
                <button onclick="copyLink('${link}', this)" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 py-4 rounded-2xl font-bold">COPY PRIVATE LINK</button>
            </div>
        `;  
        allGamesDiv.appendChild(card);  
    });

    window.copyLink = (link, btn) => {  
        navigator.clipboard.writeText(link);  
        const old = btn.textContent;  
        btn.textContent = "✓ COPIED";  
        btn.style.backgroundColor = "#22c55e";  
        setTimeout(() => {   
            btn.textContent = old;   
            btn.style.backgroundColor = "";   
        }, 1800);  
    };
</script>

</body>
</html>
