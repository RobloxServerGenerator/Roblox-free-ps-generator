<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOX Private Server Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        body { 
            background: linear-gradient(135deg, #0f0000, #220000); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; 
        }
        .bubble { 
            position: fixed; 
            border-radius: 50%; 
            background: rgba(255, 60, 60, 0.18); 
            backdrop-filter: blur(10px); 
            z-index: -1; 
            animation: float 16s linear infinite; 
        }
        @keyframes float { 
            from { transform: translateY(100vh); } 
            to { transform: translateY(-250px); } 
        }
        .game-card { 
            transition: all 0.3s ease; 
        }
        .game-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 40px rgba(255, 50, 50, 0.35); 
        }
        .game-img { 
            width: 100%; 
            height: 90px; 
            object-fit: cover; 
            border-radius: 12px; 
        }
    </style>
</head>
<body class="min-h-screen pb-20">

<script>
    // Bubble efekti
    for(let i = 0; i < 30; i++) {  
        let b = document.createElement("div");  
        b.className = "bubble";  
        let size = Math.random() * 90 + 30;  
        b.style.width = size + "px";  
        b.style.height = size + "px";  
        b.style.left = Math.random() * 100 + "vw";  
        b.style.animationDuration = (Math.random() * 15 + 12) + "s";  
        document.body.appendChild(b);  
    }  
</script>

    <div class="text-center mb-12">
        <h1 class="text-5xl md:text-6xl font-bold text-red-500 mb-2">ROBLOX PRIVATE SERVER GENERATOR</h1>
        <p class="text-red-400 text-2xl">Trending & Popular Games</p>
    </div>

    <div class="bg-black/70 backdrop-blur-2xl border border-red-600/60 rounded-3xl p-8 shadow-2xl mb-16">
        <input id="search" type="text"   
               class="w-full bg-zinc-950 border-2 border-red-500/70 focus:border-red-500 rounded-2xl px-7 py-6 text-xl outline-none"  
               placeholder="Search game...">
        <div id="results" class="mt-8 space-y-3"></div>
    </div>

    <h2 class="text-4xl font-bold text-red-400 mb-8">Trending Games</h2>
    <div id="all-games" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>
</div>

    const resultsDiv = document.getElementById("results");
    const allGamesDiv = document.getElementById("all-games");

    // Arama fonksiyonu
    document.getElementById("search").addEventListener("input", e => {  
        const q = e.target.value.toLowerCase().trim();  
        resultsDiv.innerHTML = "";  
        if (q.length < 2) return;  

        games.filter(g => g.name.toLowerCase().includes(q)).forEach(game => {  
            const slug = game.name.replace(/\s+/g, "-").toLowerCase();
            const link = `https://roblox.com.bz/games/\( {game.id}/ \){slug}?privateServerLinkCode=56676300489403480005785397786173`;  

            const div = document.createElement("div");  
            div.className = "flex justify-between items-center bg-zinc-900 border border-red-500/30 rounded-2xl p-4";  
            div.innerHTML = `  
                <span class="text-lg">${game.name}</span>  
                <button onclick="copyLink('${link}', this)" class="copy-btn bg-red-600 hover:bg-red-500 px-6 py-3 rounded-xl">Copy</button>  
            `;  
            resultsDiv.appendChild(div);  
        });  
    });

    // Tüm oyun kartları
    games.forEach(game => {  
        const slug = game.name.replace(/\s+/g, "-").toLowerCase();
        const link = `https://roblox.com.bz/games/\( {game.id}/ \){slug}?privateServerLinkCode=56676300489403480005785397786173`;  

        const card = document.createElement("div");  
        card.className = "game-card bg-zinc-900/90 border border-red-600/40 rounded-3xl overflow-hidden";  
        card.innerHTML = `  
            <img src="https://www.roblox.com/Thumbs/Asset.ashx?width=150&height=150&assetId=\( {game.id}" class="game-img" alt=" \){game.name}">
            <div class="p-3 text-center">  
                <div class="font-medium text-sm mb-3 line-clamp-2">${game.name}</div>  
                <button onclick="copyLink('${link}', this)" class="copy-btn w-full bg-red-600 hover:bg-red-500 py-3 rounded-2xl text-sm font-semibold">Copy Link</button>  
            </div>  
        `;  
        allGamesDiv.appendChild(card);  
    });

    window.copyLink = (link, btn) => {  
        navigator.clipboard.writeText(link);  
        const old = btn.textContent;  
        btn.textContent = "Copied!";  
        btn.style.backgroundColor = "#22c55e";  
        setTimeout(() => {   
            btn.textContent = old;   
            btn.style.backgroundColor = "";   
        }, 1500);  
    };
</script>
